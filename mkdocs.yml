site_name: Productive K3S Catalogs
site_description: Public catalog and marketplace for Productive K3S infrastructure scenarios, profiles and add-ons.
site_url: https://catalogs.productive-k3s.io/
repo_name: productive-k3s/productive-k3s-catalogs
repo_url: https://github.com/productive-k3s/productive-k3s-catalogs
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  favicon: assets/images/favicon.ico
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.path
    - navigation.sections
    - navigation.expand
    - navigation.footer
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: blue
  font: false
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Marketplace: catalog.md
  - Catalog format: catalog-format.md

extra_css:
  - assets/stylesheets/extra.css
  - assets/stylesheets/marketplace.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js
  - assets/javascripts/marketplace.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
      title: On this page

plugins:
  - search

extra:
  pk3s:
    footer_slogan_en: "Productive K3S Catalogs: discover curated public packages and marketplace metadata across the ecosystem."
    footer_slogan_es: "Productive K3S Catalogs: descubri paquetes publicos curados y metadatos de marketplace en todo el ecosistema."
    contact_label_en: "Contact"
    contact_label_es: "Contacto"
    newsletter_label_en: "Newsletter"
    newsletter_label_es: "Newsletter"
    newsletter_placeholder_en: "E-mail"
    newsletter_placeholder_es: "E-mail"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/productive-k3s/productive-k3s-catalogs
