name: Publish docs

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate catalog
        run: make validate

      - name: Sync catalog into docs tree
        run: make sync-catalog

      - name: Verify custom domain file
        run: |
          test -f docs/CNAME
          grep -Fx 'catalogs.productive-k3s.io' docs/CNAME

      - name: Build MkDocs site
        run: make build

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate catalog
        run: make validate

      - name: Sync catalog into docs tree
        run: make sync-catalog

      - name: Verify custom domain file
        run: |
          test -f docs/CNAME
          grep -Fx 'catalogs.productive-k3s.io' docs/CNAME

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync shared theme
        run: make sync-theme

      - name: Deploy MkDocs site
        run: mkdocs gh-deploy --force
